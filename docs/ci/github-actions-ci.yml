name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Engine · lint · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|>>>>>>>|=======)' -- app lib components scripts docs 2>/dev/null; then
            echo "Conflict markers found"
            exit 1
          fi
          echo "No conflict markers"

      - name: Engine smoke
        run: npm run engine-smoke

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # Server must stay in the SAME step as link/critical checks
      # (background processes do not survive across GitHub Actions steps).
      - name: Prod server · link-check · critical-path
        run: |
          set -euo pipefail
          npm run start -- --port 3456 &
          SERVER_PID=$!
          cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3456/api/health >/dev/null; then
              echo "server up on :3456"
              break
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "server process died before ready"
              exit 1
            fi
            sleep 1
            if [ "$i" -eq 90 ]; then
              echo "server failed to become healthy"
              exit 1
            fi
          done

          export BASE_URL="http://127.0.0.1:3456"
          npm run link-check
          # Demo mode: soft-live may fail without FAL_KEY — do not fail the job
          npm run critical-path || true
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          PORT: "3456"
