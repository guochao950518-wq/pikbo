name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Engine · lint · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|>>>>>>>|=======)' -- app lib components scripts docs 2>/dev/null; then
            echo "Conflict markers found"
            exit 1
          fi
          echo "No conflict markers"

      - name: Engine smoke
        run: npm run engine-smoke

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Start prod server
        run: |
          npm run start -- --port 3456 &
          echo $! > /tmp/pikbo-ci-server.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3456/api/health >/dev/null; then
              echo "server up"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start"
          exit 1
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          PORT: "3456"

      - name: Link check (prod)
        run: BASE_URL=http://127.0.0.1:3456 npm run link-check
        env:
          BASE_URL: "http://127.0.0.1:3456"

      - name: Critical path (demo)
        run: BASE_URL=http://127.0.0.1:3456 npm run critical-path || true
        env:
          BASE_URL: "http://127.0.0.1:3456"

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/pikbo-ci-server.pid ]; then
            kill "$(cat /tmp/pikbo-ci-server.pid)" 2>/dev/null || true
          fi
